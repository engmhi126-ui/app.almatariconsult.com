<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>تقرير زيارة — المطري كونسلت</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f0f0f0;color:#111;direction:rtl}
    .container{max-width:800px;margin:0 auto;background:#fff;padding:35px;box-shadow:0 2px 20px rgba(0,0,0,.1)}
    .header{text-align:center;border-bottom:3px solid #D4A843;padding-bottom:22px;margin-bottom:26px}
    .logo-img{width:70px;height:70px;background:linear-gradient(135deg,#D4A843,#7A5010);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto 10px}
    .logo{font-size:24px;font-weight:900;color:#D4A843}
    .logo-sub{font-size:13px;color:#888;margin-top:3px}
    .report-title{font-size:19px;font-weight:800;color:#111;margin-top:14px}
    .report-meta{font-size:12px;color:#888;margin-top:6px;line-height:1.8}
    .section{margin-bottom:24px}
    .section-title{font-size:14px;font-weight:800;background:#fdf8ed;border-right:4px solid #D4A843;padding:9px 13px;margin-bottom:13px;color:#333}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field{background:#fafafa;border:1px solid #e8e8e8;border-radius:8px;padding:11px}
    .field .k{font-size:10px;color:#888;margin-bottom:3px;font-weight:700;text-transform:uppercase}
    .field .v{font-size:14px;font-weight:700;color:#111}
    .report-text{background:#fafafa;border:1px solid #e8e8e8;border-radius:8px;padding:16px;font-size:13px;line-height:2;white-space:pre-wrap;color:#222}
    .contractor-box{background:#fff8f0;border:1px solid #f5d0a9;border-radius:8px;padding:13px}
    .status-box{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:800}
    .status-done{background:#dcfce7;color:#166534}
    .status-review{background:#fef9c3;color:#713f12}
    .status-progress{background:#dbeafe;color:#1e40af}
    .footer{margin-top:34px;text-align:center;padding-top:18px;border-top:2px solid #f0f0f0}
    .footer p{font-size:11px;color:#999;margin-bottom:4px}
    .stamp{font-size:14px;color:#D4A843;font-weight:800;margin-top:10px;letter-spacing:1px}
    .seal{display:inline-block;border:2px solid #D4A843;border-radius:50%;padding:10px 16px;font-size:12px;color:#D4A843;font-weight:800;margin-top:10px}
    .actions{display:flex;gap:10px;justify-content:center;padding:16px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100}
    .btn{padding:11px 26px;border:none;border-radius:9px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
    .btn-print{background:#D4A843;color:#fff;box-shadow:0 2px 10px rgba(212,168,67,.3)}
    .btn-close{background:#888;color:#fff}
    .loading{text-align:center;padding:80px;font-size:16px;color:#888}
    .error-box{text-align:center;padding:80px;color:#dc2626;font-size:16px}
    @media print{.actions{display:none}body{background:#fff}.container{box-shadow:none;padding:20px}}
    @media(max-width:600px){.grid{grid-template-columns:1fr}.container{padding:20px}}
  </style>
</head>
<body>
<div class="actions" id="actions" style="display:none">
  <button class="btn btn-print" onclick="window.print()">🖨️ طباعة / حفظ PDF</button>
  <button class="btn btn-close" onclick="window.close()">✕ إغلاق</button>
</div>
<div class="container">
  <div id="content"><div class="loading">⏳ جاري تحميل التقرير...</div></div>
</div>
<script>
const SB_URL='https://qxklfethbynwcxswacwj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4a2xmZXRoYnlud2N4c3dhY3dqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDM2NDcwNSwiZXhwIjoyMDg5OTQwNzA1fQ.EUC8TfrKrflvvIQoQMVUdk-6WQL5SyJKisBD6Pf9110';

const esc=s=>String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');

const statusMap={completed:{cls:'status-done',t:'مكتمل'},in_progress:{cls:'status-progress',t:'قيد المعالجة'},review:{cls:'status-review',t:'مراجعة'},accepted:{cls:'status-progress',t:'مقبول'},pending:{cls:'status-review',t:'بانتظار التنفيذ'}};

async function loadReport(){
  const params=new URLSearchParams(window.location.search);
  const dataParam=params.get('data');
  const visitId=params.get('id');

  if(dataParam){
    try{
      let decoded;
      try{ decoded=JSON.parse(decodeURIComponent(atob(dataParam))) }
      catch{ decoded=JSON.parse(atob(dataParam)) }
      renderReport(decoded,true);
      return;
    }catch(e){
      document.getElementById('content').innerHTML='<div class="error-box">❌ خطأ في قراءة بيانات التقرير.</div>';
      return;
    }
  }

  if(!visitId){
    document.getElementById('content').innerHTML='<div class="error-box">❌ لم يتم تحديد رقم التقرير.</div>';
    return;
  }

  try{
    // Try visit_reports first
    const r1=await fetch(`${SB_URL}/rest/v1/v_visit_reports_full?visit_id=eq.${visitId}&select=*&limit=1`,
      {headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
    const d1=await r1.json();
    if(d1.length){renderReport(d1[0],false);return;}

    // Fallback to visits
    const r2=await fetch(`${SB_URL}/rest/v1/v_visits_full?id=eq.${visitId}&select=*&limit=1`,
      {headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
    const d2=await r2.json();
    if(d2.length){renderReport(d2[0],false);return;}

    document.getElementById('content').innerHTML='<div class="error-box">❌ لم يتم العثور على التقرير.</div>';
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="error-box">❌ خطأ: ${esc(e.message)}</div>`;
  }
}

function buildUnifiedReportText(r){
  // Merge report_text + AI insights into one clean professional text (no mention of AI)
  let parts=[];
  if(r.report_text&&r.report_text.trim()) parts.push(r.report_text.trim());
  
  // Add AI content silently as part of the report (engineer's observations)
  if(r.ai_defects?.length){
    const notInText = r.ai_defects.filter(d=>!(r.report_text||'').includes(d));
    if(notInText.length) parts.push('العيوب المرصودة:\n'+notInText.map(d=>`• ${d}`).join('\n'));
  }
  if(r.ai_recommendations?.length){
    const notInText = r.ai_recommendations.filter(rec=>!(r.report_text||'').includes(rec));
    if(notInText.length) parts.push('التوصيات الفنية:\n'+notInText.map(rec=>`• ${rec}`).join('\n'));
  }
  if(r.ai_client_message&&!(r.report_text||'').includes(r.ai_client_message)){
    parts.push('ملاحظة للمالك:\n'+r.ai_client_message);
  }
  return parts.join('\n\n');
}

function renderReport(r, isPreview){
  const today=new Date().toLocaleDateString('ar-SA');
  const st=statusMap[r.visit_status||r.status]||{cls:'status-review',t:'—'};
  const contractorName=r.contractor_name;
  const contractorPhone=r.contractor_phone;
  const unifiedText=buildUnifiedReportText(r);
  const previewBanner=isPreview?`<div style="background:#fef3c7;border:2px solid #D97706;border-radius:8px;padding:10px 14px;margin-bottom:20px;font-size:13px;font-weight:700;color:#92400e;text-align:center">⚠️ هذه معاينة قبل الإرسال — لم يُرسل التقرير بعد</div>`:'';

  document.getElementById('content').innerHTML=`
    ${previewBanner}
    <div class="header">
      <div class="logo-img">م</div>
      <div class="logo">المطري كونسلت</div>
      <div class="logo-sub">للاستشارات الهندسية</div>
      <div class="report-title">تقرير زيارة إشرافية</div>
      <div class="report-meta">
        رقم الطلب: <strong>${esc(r.visit_number||'—')}</strong> &nbsp;|&nbsp;
        التاريخ: <strong>${esc(r.preferred_date||today)}</strong><br>
        الحالة: <span class="status-box ${st.cls}">${st.t}</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">👤 بيانات العميل</div>
      <div class="grid">
        <div class="field"><div class="k">الاسم</div><div class="v">${esc(r.client_name||'—')}</div></div>
        <div class="field"><div class="k">الجوال</div><div class="v">${esc(r.client_phone||'—')}</div></div>
        <div class="field"><div class="k">المدينة</div><div class="v">${esc(r.city||'—')}</div></div>
        <div class="field"><div class="k">الحي</div><div class="v">${esc(r.district||'—')}</div></div>
        <div class="field"><div class="k">نوع العقار</div><div class="v">${esc(r.property_type||'—')}</div></div>
        <div class="field"><div class="k">الفترة</div><div class="v">${esc(r.preferred_time||'—')}</div></div>
      </div>
    </div>

    ${contractorName?`<div class="section">
      <div class="section-title">👷 بيانات المقاول</div>
      <div class="contractor-box">
        <div class="grid">
          <div class="field"><div class="k">اسم المقاول</div><div class="v">${esc(contractorName)}</div></div>
          ${contractorPhone?`<div class="field"><div class="k">جوال المقاول</div><div class="v">${esc(contractorPhone)}</div></div>`:''}
        </div>
      </div></div>`:''}

    <div class="section">
      <div class="section-title">🏗️ بيانات الإشراف</div>
      <div class="grid">
        <div class="field"><div class="k">المهندس المشرف</div><div class="v">${esc(r.engineer_name||'—')}</div></div>
        <div class="field"><div class="k">تاريخ التقرير</div><div class="v">${esc(r.preferred_date||today)}</div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📋 تقرير الزيارة الإشرافية</div>
      <div class="report-text">${esc(unifiedText||'لم يتم إدخال نص التقرير.')}</div>
    </div>

    <div class="footer">
      <p>هذا التقرير صادر من مكتب المطري كونسلت للاستشارات الهندسية</p>
      <p>تاريخ الإصدار: ${today}</p>
      <div class="seal">اعتمد بواسطة المهندس</div>
      <div class="stamp">المطري كونسلت ✦ إشراف هندسي معتمد</div>
    </div>`;

  document.getElementById('actions').style.display='flex';
  document.title=`تقرير ${r.visit_number||''}`;
}

loadReport();
</script>
</body>
</html>
