<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المطري كونسلت</title>
  <style>
    body{
      font-family: Tahoma, Arial, sans-serif;
      background:#f5f7fb;
      margin:0;
      padding:0;
      direction:rtl;
    }
    .box{
      max-width:500px;
      margin:40px auto;
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }
    h1{
      text-align:center;
      color:#1f3c88;
    }
    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-weight:bold;
    }
    input, textarea, button{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
      box-sizing:border-box;
    }
    textarea{
      min-height:100px;
      resize:vertical;
    }
    button{
      margin-top:18px;
      background:#1f3c88;
      color:#fff;
      border:none;
      cursor:pointer;
    }
    button:hover{
      opacity:.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>طلب زيارة إشراف</h1>

    <label>الاسم</label>
    <input type="text" id="name" />

    <label>رقم الجوال</label>
    <input type="text" id="phone" />

    <label>المدينة</label>
    <input type="text" id="city" />

    <label>وصف الطلب</label>
    <textarea id="description"></textarea>

    <button onclick="sendRequest()">إرسال الطلب</button>
  </div>

  <script>
    async function sendRequest() {
      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        city: document.getElementById('city').value,
        description: document.getElementById('description').value
      };

      alert("تم التقاط البيانات مبدئيًا");
      console.log(data);
    }
  </script>
</body>
</html>
